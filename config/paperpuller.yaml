arxiv:
  categories:
    - cs.CV
    - cs.AI
    - cs.LG
  fetch_days: 1
  max_candidates: 100
  request_pause_seconds: 15
  keyword_queries:
    - scene text recognition
    - Chinese OCR
    - masked autoencoder
    - masked image modeling
    - self-supervised visual pretraining
    - vision-language text recognition
    - data augmentation text recognition
    - text image restoration

interest_file: config/interest.md

llm:
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: deepseek-v4-flash
  api_key_env: PAPERPULLER_API_KEY
  temperature: 0.1
  timeout_seconds: 60
  max_retries: 3

ranking:
  high_priority_threshold: 7
  possible_threshold: 4
  max_report_papers: 50

storage:
  sqlite_path: data/papers.sqlite3
  report_dir: reports

email:
  enabled: true
  smtp_server:  smtp.gmail.com
  smtp_port: 587
  sender: kyriezhang21@gmail.com
  receiver: 527479352@qq.com
  password_env: PAPERPULLER_SMTP_PASSWORD
  subject: Daily arXiv

