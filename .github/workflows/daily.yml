name: Daily PaperPuller

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Run PaperPuller
        env:
          PAPERPULLER_API_KEY: ${{ secrets.PAPERPULLER_API_KEY }}
          PAPERPULLER_SMTP_PASSWORD: ${{ secrets.PAPERPULLER_SMTP_PASSWORD }}
        run: python -m paperpuller run --config config/paperpuller.yaml
      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports data || true
          git diff --cached --quiet || git commit -m "Update daily paper report"
          git push

